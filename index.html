<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-box position="-0.5 0.45 0.5" size="0.5 0.5 0.5" rotation="0 45 0" color="#d41620"></a-box>
      <a-sphere position="0.5 0.7 0.75" radius="0.5" color="#3278c3"></a-sphere>
      <a-cylinder position="-0.2 1.2 -0.25" radius="0.25" height="2" color="#FFC65D"></a-cylinder>
      <a-cone position="1 0.8 -0.5" radius="0.5" height="1" color="#7BC8A4"></a-cone>
      <a-sky color="#ECECEC" position="0 1 0"></a-sky>
      <a-box position="0 0.1 0" size="3 0.2 3" rotation="0 0 0" color="#9a9898"></a-box>
      <a-box position="0 1.7 -1.4" size="3 0.2 3" rotation="0 90 90" color="#e9d8d9"></a-box>
      <a-box position="1.4 1.7 0" size="3 0.2 3" rotation="0 0 90" color="#e4bebe"></a-box>
      <a-entity light="type=ambient"; color="#FFFFFF" position="3 3 3"></a-entity>
      <a-entity id="rig" position="rig">
      <a-entity id="camera" camera look-controls></a-entity>
      </a-entity>
      <a-entity camera look-controls position="3 3 3"></a-entity>
    </a-scene>
  </body>
</html>
